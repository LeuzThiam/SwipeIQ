name: Rapport de bug
description: Signaler un probleme reproductible
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Que s'est-il passe ?
      placeholder: Decris le bug de facon claire et concise.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Etapes pour reproduire
      description: Donne des etapes exactes.
      placeholder: |
        1. Aller a ...
        2. Appuyer sur ...
        3. Observer ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      placeholder: Quel resultat attendais-tu ?
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environnement
      placeholder: OS, appareil, version Flutter
