name: CI Backend

on:
  push:
    branches: [dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Initialiser .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Detecter les projets
        id: detect
        run: |
          if find backend/src -name "*.csproj" | grep -q .; then
            echo "has_projects=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_projects=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compiler
        if: steps.detect.outputs.has_projects == 'true'
        run: dotnet build backend/src --configuration Release

      - name: Tester
        if: steps.detect.outputs.has_projects == 'true'
        run: dotnet test backend/tests --configuration Release

      - name: Aucun projet backend pour l'instant
        if: steps.detect.outputs.has_projects == 'false'
        run: echo "Scaffold backend uniquement - build/test dotnet ignores."

      - name: Build Docker
        run: docker build -f backend/Dockerfile -t swipeiq-backend:ci .
