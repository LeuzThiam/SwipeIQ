name: Backend CI

on:
  push:
    branches: [dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Detect projects
        id: detect
        run: |
          if find backend/src -name "*.csproj" | grep -q .; then
            echo "has_projects=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_projects=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.detect.outputs.has_projects == 'true'
        run: dotnet build backend/src --configuration Release

      - name: Test
        if: steps.detect.outputs.has_projects == 'true'
        run: dotnet test backend/tests --configuration Release

      - name: No backend project yet
        if: steps.detect.outputs.has_projects == 'false'
        run: echo "Backend scaffold only - skipping dotnet build/test."

      - name: Docker build
        run: docker build -f backend/Dockerfile -t swipeiq-backend:ci .
