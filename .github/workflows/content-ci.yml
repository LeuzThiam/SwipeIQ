name: Content CI

on:
  push:
    branches: [dev]
    paths:
      - "content/**"
      - "tools/**"
      - ".github/workflows/content-ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "content/**"
      - "tools/**"
      - ".github/workflows/content-ci.yml"

jobs:
  validate-content:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/validator/validate_questions.py
