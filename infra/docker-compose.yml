version: "3.9"

services:
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    env_file:
      - ./env/.env.example
    volumes:
      - ./n8n:/home/node/.n8n
      - ./storage:/data

  validator:
    build:
      context: ..
      dockerfile: tools/validator/Dockerfile
    volumes:
      - ../content:/workspace/content
      - ../tools:/workspace/tools

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    profiles: ["backend"]
    ports:
      - "8000:8000"
